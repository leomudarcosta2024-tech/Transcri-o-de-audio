<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcritor de Áudio (Detector de Silêncio)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 10px; }
        #status { font-size: 0.9rem; color: #666; margin-bottom: 20px; font-weight: bold; text-align: center;}
        #transcript-box {
            width: 100%; max-width: 600px; flex-grow: 1;
            background-color: #fff; border: 2px solid #ddd; border-radius: 12px;
            padding: 15px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px; font-size: 1.1rem; line-height: 1.5;
        }
        #final-text { color: #000; }
        #interim-text { color: #888; font-style: italic; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; max-width: 600px; }
        button {
            flex: 1; min-width: 30%; padding: 15px 10px; font-size: 1rem;
            font-weight: bold; border: none; border-radius: 8px; cursor: pointer;
            color: white; transition: all 0.3s ease;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        #btn-start { background-color: #28a745; } 
        #btn-stop { background-color: #dc3545; } 
        #btn-clear { background-color: #6c757d; } 
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <h1>Transcritor de Áudio</h1>
    <div id="status">Pronto para iniciar.</div>
    <div id="transcript-box">
        <span id="final-text"></span>
        <span id="interim-text"></span>
    </div>
    <div class="btn-container">
        <button id="btn-start">▶ Iniciar</button>
        <button id="btn-stop" disabled>⏹ Parar</button>
        <button id="btn-clear">🗑️ Limpar</button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Seu navegador não suporta a API. Use o Chrome.");
            document.getElementById('status').innerText = "Erro: Navegador não suportado.";
        } else {
            const recognition = new SpeechRecognition();
            
            // Voltamos para contínuo para NÃO cortar quem fala rápido
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'pt-BR'; 

            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnClear = document.getElementById('btn-clear');
            const statusText = document.getElementById('status');
            const finalTextSpan = document.getElementById('final-text');
            const interimTextSpan = document.getElementById('interim-text');

            let isRecognizing = false;
            let wakeLock = null;
            
            let historicoCompleto = ''; 
            let cronometroSilencio = null;
            const TEMPO_DE_PAUSA = 1500; // 1.5 segundos de silêncio para limpar a memória

            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                } catch (err) {
                    console.warn(`Erro no WakeLock: ${err.message}`);
                }
            }

            function releaseWakeLock() {
                if (wakeLock !== null) {
                    wakeLock.release().then(() => { wakeLock = null; });
                }
            }

            recognition.onstart = () => {
                isRecognizing = true;
                statusText.innerText = "🔴 Escutando...";
                statusText.style.color = "#dc3545";
                btnStart.disabled = true;
                btnStop.disabled = false;
                requestWakeLock(); 
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let textoFinalNovo = '';

                // Lê apenas as palavras novas confirmadas
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        textoFinalNovo += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                if (textoFinalNovo !== '') {
                    historicoCompleto += textoFinalNovo;
                }

                finalTextSpan.innerHTML = historicoCompleto;
                interimTextSpan.innerHTML = interimTranscript;
                
                const box = document.getElementById('transcript-box');
                box.scrollTop = box.scrollHeight;

                // DETECTOR DE SILÊNCIO:
                // Sempre que ele escuta qualquer som (mesmo que provisório), ele zera a bomba relógio.
                clearTimeout(cronometroSilencio);
                
                // Se ficar 1.5 segundos em silêncio total, a bomba explode e ele reinicia o microfone sozinho
                cronometroSilencio = setTimeout(() => {
                    if (isRecognizing) {
                        recognition.stop(); // Isso força a limpeza de memória durante a pausa
                    }
                }, TEMPO_DE_PAUSA);
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed' || event.error === 'audio-capture') {
                    statusText.innerText = "Erro: Microfone bloqueado.";
                    isRecognizing = false; 
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    releaseWakeLock();
                }
            };

            recognition.onend = () => {
                // Religa instantaneamente. Como isso foi disparado na pausa da fala, o ponto cego passa despercebido.
                if (isRecognizing) {
                    setTimeout(() => {
                        if (isRecognizing) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 50); 
                } else {
                    statusText.innerText = "Parado.";
                    statusText.style.color = "#666";
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    btnStart.innerHTML = "🔄 Reiniciar";
                    btnStart.style.backgroundColor = "#007bff"; 
                    releaseWakeLock(); 
                    clearTimeout(cronometroSilencio);
                }
            };

            btnStart.addEventListener('click', () => {
                btnStart.innerHTML = "▶ Iniciar";
                btnStart.style.backgroundColor = "#28a745";
                try { recognition.start(); } catch (e) {}
            });

            btnStop.addEventListener('click', () => {
                isRecognizing = false; 
                recognition.stop(); 
            });

            btnClear.addEventListener('click', () => {
                historicoCompleto = '';
                finalTextSpan.innerHTML = '';
                interimTextSpan.innerHTML = '';
            });
        }
    </script>
</body>
</html>

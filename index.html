<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcritor de Áudio Seguro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 10px; }
        #status { font-size: 0.9rem; color: #666; margin-bottom: 20px; font-weight: bold; text-align: center;}
        #transcript-box {
            width: 100%; max-width: 600px; flex-grow: 1;
            background-color: #fff; border: 2px solid #ddd; border-radius: 12px;
            padding: 15px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px; font-size: 1.1rem; line-height: 1.5;
        }
        #final-text { color: #000; }
        #interim-text { color: #888; font-style: italic; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; max-width: 600px; }
        button {
            flex: 1; min-width: 30%; padding: 15px 10px; font-size: 1rem;
            font-weight: bold; border: none; border-radius: 8px; cursor: pointer;
            color: white; transition: all 0.3s ease;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        #btn-start { background-color: #28a745; } 
        #btn-stop { background-color: #dc3545; } 
        #btn-clear { background-color: #6c757d; } 
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <h1>Transcritor de Áudio</h1>
    <div id="status">Pronto para iniciar.</div>
    <div id="transcript-box">
        <span id="final-text"></span>
        <span id="interim-text"></span>
    </div>
    <div class="btn-container">
        <button id="btn-start">▶ Iniciar</button>
        <button id="btn-stop" disabled>⏹ Parar</button>
        <button id="btn-clear">🗑️ Limpar</button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Seu navegador não suporta a API. Use o Chrome.");
            document.getElementById('status').innerText = "Erro: Navegador não suportado.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'pt-BR'; 

            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnClear = document.getElementById('btn-clear');
            const statusText = document.getElementById('status');
            const finalTextSpan = document.getElementById('final-text');
            const interimTextSpan = document.getElementById('interim-text');

            let finalTranscript = '';
            let isRecognizing = false;
            let wakeLock = null;

            // Função para manter a tela do celular acesa
            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        console.log('Tela bloqueada para não apagar.');
                    }
                } catch (err) {
                    console.warn(`Erro no WakeLock: ${err.message}`);
                }
            }

            // Função para liberar a tela quando parar
            function releaseWakeLock() {
                if (wakeLock !== null) {
                    wakeLock.release().then(() => {
                        wakeLock = null;
                        console.log('Bloqueio de tela liberado.');
                    });
                }
            }

            recognition.onstart = () => {
                isRecognizing = true;
                statusText.innerText = "🔴 Escutando (Tela protegida)...";
                statusText.style.color = "#dc3545";
                btnStart.disabled = true;
                btnStop.disabled = false;
                requestWakeLock(); // Pede para manter a tela acesa
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                finalTextSpan.innerHTML = finalTranscript;
                interimTextSpan.innerHTML = interimTranscript;
                const box = document.getElementById('transcript-box');
                box.scrollTop = box.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.warn("Erro recebido:", event.error);
                
                // Erros silenciosos (como ausência de som temporária) não devem parar tudo
                if (event.error === 'not-allowed' || event.error === 'audio-capture') {
                    statusText.innerText = "Erro: Microfone bloqueado ou em uso.";
                    isRecognizing = false; // Força a parada segura
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    releaseWakeLock();
                }
            };

            recognition.onend = () => {
                if (isRecognizing) {
                    // DELAY DE SEGURANÇA: Espera meio segundo antes de religar para não ser bloqueado como Spam
                    setTimeout(() => {
                        if (isRecognizing) {
                            try { recognition.start(); } catch(e) { console.warn("Falha no reinício automático."); }
                        }
                    }, 500); 
                } else {
                    statusText.innerText = "Parado.";
                    statusText.style.color = "#666";
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    btnStart.innerHTML = "🔄 Reiniciar";
                    btnStart.style.backgroundColor = "#007bff"; 
                    releaseWakeLock(); // Deixa a tela apagar normalmente
                }
            };

            btnStart.addEventListener('click', () => {
                btnStart.innerHTML = "▶ Iniciar";
                btnStart.style.backgroundColor = "#28a745";
                try { recognition.start(); } catch (e) {}
            });

            btnStop.addEventListener('click', () => {
                isRecognizing = false; 
                recognition.stop(); 
            });

            btnClear.addEventListener('click', () => {
                finalTranscript = '';
                finalTextSpan.innerHTML = '';
                interimTextSpan.innerHTML = '';
            });
        }
    </script>
</body>
</html>
